<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECAIR — Grilles Qualité</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#F5F3EE;--surface:#FDFCF9;--border:#E2DDD5;--border-strong:#C8C0B4;--text:#1A1714;--text-muted:#7A7269;--accent:#2A5C45;--accent-light:#EAF1ED;--ok:#2A5C45;--ok-bg:#EAF1ED;--ko:#8B2020;--ko-bg:#F7EDED;--na:#5A5248;--na-bg:#EDEBE7;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.logo{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;}
.sidebar-title{font-size:16px;font-weight:600;}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-section{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:10px 8px 6px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:none;border-radius:var(--radius);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-muted);transition:all .15s;}
.nav-btn:hover{background:var(--bg);color:var(--text);}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.nav-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;background:var(--border);color:var(--text-muted);padding:1px 6px;border-radius:99px;}
.nav-btn.active .nav-badge{background:var(--accent);color:white;}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.topbar-title{font-size:15px;font-weight:600;flex:1;min-width:200px;}
.field-group{display:flex;align-items:center;gap:8px;}
.field-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);white-space:nowrap;}
input[type=text],input[type=date]{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;}
input[type=text]{width:200px;}input[type=date]{width:150px;}
.btn-export{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;background:var(--accent);color:white;border:none;border-radius:var(--radius);cursor:pointer;white-space:nowrap;}
.btn-export:disabled{opacity:.4;cursor:not-allowed;}
.content{flex:1;padding:24px 28px;}
.grille-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.stats-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.stat-pill{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500;}
.stat-ok{background:var(--ok-bg);color:var(--ok);}
.stat-ko{background:var(--ko-bg);color:var(--ko);}
.stat-na{background:var(--na-bg);color:var(--na);}
.stat-total{background:var(--border);color:var(--text-muted);}
.score-display{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);}
.btn-reset{font-size:12px;padding:5px 12px;border:1px solid var(--border-strong);background:var(--surface);border-radius:var(--radius);cursor:pointer;color:var(--text-muted);}
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border);}
.tab-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 24px;border:none;background:none;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.section-block{margin-bottom:6px;}
.section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:12px 0 6px;border-top:1px solid var(--border);margin-top:4px;}
.criteria-row{display:flex;align-items:flex-start;gap:12px;padding:8px 10px;border-radius:var(--radius);border:1px solid transparent;margin-bottom:2px;}
.criteria-row:hover{background:var(--surface);}
.criteria-row.is-ko{background:var(--ko-bg);border-color:#E8C4C4;}
.criteria-row.is-na{background:var(--na-bg);border-color:var(--border);}
.criteria-text{flex:1;line-height:1.45;font-size:13px;padding-top:1px;}
.criteria-hint{font-size:11px;color:var(--text-muted);margin-top:2px;font-style:italic;}
.criteria-poids{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);min-width:24px;text-align:right;padding-top:3px;}
.okna-group{display:flex;gap:4px;flex-shrink:0;padding-top:1px;}
.okna-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;border:1px solid var(--border-strong);background:var(--bg);cursor:pointer;color:var(--text-muted);}
.okna-btn.ok.selected{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);}
.okna-btn.ko.selected{background:var(--ko-bg);border-color:var(--ko);color:var(--ko);}
.okna-btn.na.selected{background:var(--na-bg);border-color:var(--na);color:var(--na);}
.comment-input{display:none;margin-top:6px;width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 8px;border:1px solid #E8C4C4;border-radius:5px;background:white;color:var(--ko);outline:none;resize:none;}
.criteria-row.is-ko .comment-input{display:block;}
.list-view{padding:4px 0;}
.list-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;}
.list-item:hover{border-color:var(--accent);background:var(--accent-light);}
.list-code{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);min-width:50px;}
.list-name{flex:1;font-size:14px;font-weight:500;}
.list-count{font-size:12px;color:var(--text-muted);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">ECAIR</div>
      <div class="sidebar-title">Grilles Qualité</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Navigation</div>

      <div class="nav-section" style="margin-top:8px;">Grilles</div>

      <button class="nav-btn" id="nav-A7A8" onclick="openGrille('A7A8')">A7/A8 — RAPO <span class="nav-badge">32</span></button>

  <main class="main">
    <div class="topbar">

      <div class="field-group"><span class="field-label">Particulier</span><input type="text" id="input-nom" placeholder="Prénom Nom"></div>
      <div class="field-group"><span class="field-label">Date</span><input type="date" id="input-date"></div>
      <div class="field-group"><span class="field-label">BOA</span><input type="text" id="input-boa" placeholder="Nom du BOA" style="width:150px"></div>
      <button class="btn-export" id="btn-export" onclick="exportXlsx()" disabled>Exporter .xlsx</button>
    </div>
    <div class="content" id="content">
      <div class="empty-state"><p style="font-size:15px;font-weight:500;color:var(--text)">Aucune grille sélectionnée</p><p style="margin-top:6px;font-size:13px;">Choisissez une grille dans le menu de gauche</p></div>
    </div>
  </main>
</div>

const today = new Date().toISOString().split('T')[0];
document.getElementById('input-date').value = today;

let currentGrille = null;
let activeTab = {};
const answers = {};
const comments = {};

function getItems(code) {
  const g = GRILLES[code];
  if (g.tabs) {
    const result = {};
    g.tabs.forEach(function(tab) { result[tab.code] = tab.sections.flatMap(function(s) { return s.items; }); });
    return result;
  }
  return { [code]: g.sections.flatMap(function(s) { return s.items; }) };
}

function initAnswers(code) {
  const g = GRILLES[code];
  const codes = g.tabs ? g.tabs.map(function(t) { return t.code; }) : [code];
  const sectionSets = g.tabs ? g.tabs.map(function(t) { return t.sections; }) : [g.sections];
  codes.forEach(function(c, i) {
    if (!answers[c]) {
      answers[c] = {};
      comments[c] = {};
      let idx = 0;
      sectionSets[i].forEach(function(s) {
        s.items.forEach(function() { answers[c][idx] = 'OK'; comments[c][idx] = ''; idx++; });
      });
    }
  });
}

function setAnswer(tabCode, idx, val) {
  answers[tabCode][idx] = val;
  const row = document.querySelector('[data-tab="' + tabCode + '"][data-idx="' + idx + '"]');
  if (!row) return;
  row.className = 'criteria-row' + (val === 'KO' ? ' is-ko' : val === 'NA' ? ' is-na' : '');
  row.querySelectorAll('.okna-btn').forEach(function(b) { b.classList.remove('selected'); });
  row.querySelector('.okna-btn.' + val.toLowerCase()).classList.add('selected');
  updateStats(currentGrille);
}

function updateStats(code) {
  const g = GRILLES[code];
  let ok = 0, ko = 0, na = 0, total = 0, scoreMax = 0, scoreOK = 0;
  const tabs = g.tabs ? g.tabs : [{code: code, sections: g.sections}];
  tabs.forEach(function(tab) {
    if (!answers[tab.code]) return;
    let idx = 0;
    tab.sections.forEach(function(s) {
      s.items.forEach(function(item) {
        const v = answers[tab.code][idx] || 'OK';
        total++; if (v === 'OK') ok++; else if (v === 'KO') ko++; else na++;
        if (v !== 'NA' && item.poids > 0) scoreMax += item.poids;
        if (v === 'OK' && item.poids > 0) scoreOK += item.poids;
        idx++;
      });
    });
  });
  const taux = scoreMax > 0 ? Math.round(scoreOK / scoreMax * 100) : 0;
  const el = document.getElementById('stats-' + code);
  if (el) el.innerHTML =
    '<span class="stat-pill stat-ok">OK: ' + ok + '</span>' +
    '<span class="stat-pill stat-ko">KO: ' + ko + '</span>' +
    '<span class="stat-pill stat-na">NA: ' + na + '</span>' +
    '<span class="stat-pill stat-total">' + total + ' critères</span>' +
    '<span class="score-display">Taux: ' + taux + '%</span>';
}

function buildSectionsHtml(tabCode, sections) {
  let html = '';
  let globalIdx = 0;
  sections.forEach(function(section) {
    html += '<div class="section-block"><div class="section-title">' + section.title + '</div>';
    section.items.forEach(function(item) {
      const idx = globalIdx;
      const val = (answers[tabCode] && answers[tabCode][idx]) ? answers[tabCode][idx] : 'OK';
      const rowClass = 'criteria-row' + (val === 'KO' ? ' is-ko' : val === 'NA' ? ' is-na' : '');
      html += '<div class="' + rowClass + '" data-tab="' + tabCode + '" data-idx="' + idx + '">';
      html += '<div class="criteria-text">' + item.text;
      if (item.hint) html += '<div class="criteria-hint">' + item.hint + '</div>';
      html += '<textarea class="comment-input" placeholder="Commentaire sur erreur..." rows="2" data-tab="' + tabCode + '" data-idx="' + idx + '">' + ((comments[tabCode] && comments[tabCode][idx]) ? comments[tabCode][idx] : '') + '</textarea>';
      html += '</div>';
      html += '<span class="criteria-poids">' + (item.poids > 0 ? item.poids : '') + '</span>';
      html += '<div class="okna-group">';
      ['OK','KO','NA'].forEach(function(v) {
        html += '<button class="okna-btn ' + v.toLowerCase() + (val === v ? ' selected' : '') + '" onclick="setAnswer(\'' + tabCode + '\',' + idx + ',\'' + v + '\')">' + v + '</button>';
      });
      html += '</div></div>';
      globalIdx++;
    });
    html += '</div>';
  });
  return html;
}

function renderGrille(code) {
  initAnswers(code);
  const g = GRILLES[code];
  let html = '<div class="grille-header"><div id="stats-' + code + '" class="stats-row"></div>';
  html += '<button class="btn-reset" onclick="resetGrille(\'' + code + '\')">Tout remettre en OK</button></div>';

  if (g.tabs) {
    if (!activeTab[code]) activeTab[code] = g.tabs[0].code;
    const curTab = activeTab[code];
    // Tab bar
    html += '<div class="tab-bar">';
    g.tabs.forEach(function(tab) {
      html += '<button class="tab-btn' + (tab.code === curTab ? ' active' : '') + '" onclick="switchTab(\'' + code + '\',\'' + tab.code + '\')">' + tab.title + '</button>';
    });
    html += '</div>';
    // Active tab content
    const tab = g.tabs.find(function(t) { return t.code === curTab; });
    html += buildSectionsHtml(tab.code, tab.sections);
  } else {
    html += buildSectionsHtml(code, g.sections);
  }

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.comment-input').forEach(function(el) {
    el.addEventListener('change', function() {
      if (!comments[this.dataset.tab]) comments[this.dataset.tab] = {};
      comments[this.dataset.tab][parseInt(this.dataset.idx)] = this.value;
    });
  });
  updateStats(code);
}

function switchTab(code, tabCode) {
  activeTab[code] = tabCode;
  renderGrille(code);
}

function resetGrille(code) {
  const g = GRILLES[code];
  const tabs = g.tabs ? g.tabs : [{code: code, sections: g.sections}];
  tabs.forEach(function(tab) {
    let idx = 0;
    tab.sections.forEach(function(s) {
      s.items.forEach(function() { answers[tab.code][idx] = 'OK'; comments[tab.code][idx] = ''; idx++; });
    });
  });
  renderGrille(code);
}

function openGrille(code) {
  currentGrille = code;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('nav-' + code).classList.add('active');
  document.getElementById('topbar-title').textContent = GRILLES[code].title;
  document.getElementById('btn-export').disabled = false;
  renderGrille(code);
}

function showList() {
  currentGrille = null;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('nav-list').classList.add('active');
  document.getElementById('topbar-title').textContent = 'Toutes les grilles disponibles';
  document.getElementById('btn-export').disabled = true;
  let html = '<div class="list-view">';
  Object.values(GRILLES).forEach(function(g) {
    let count;
    if (g.tabs) {
      count = g.tabs.reduce(function(a, tab) { return a + tab.sections.reduce(function(b, s) { return b + s.items.length; }, 0); }, 0);
    } else {
      count = g.sections.reduce(function(a, s) { return a + s.items.length; }, 0);
    }
    html += '<div class="list-item" onclick="openGrille(\'' + g.code + '\')">';
    html += '<span class="list-code">' + g.code + '</span>';
    html += '<div><div class="list-name">' + g.title + '</div><div class="list-count">' + count + ' critères</div></div>';
    html += '<span class="list-arrow">&#8594;</span></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function exportXlsx() {
  if (!currentGrille) return;
  const nom = document.getElementById('input-nom').value.trim() || 'Prénom Nom';
  const date = document.getElementById('input-date').value || today;
  const boa = document.getElementById('input-boa').value.trim() || '';
  const code = currentGrille;

  const payload = { code, nom, date, boa, answers: {}, comments: {} };
  if (GRILLES[code].tabs) {
    GRILLES[code].tabs.forEach(function(tab) {
      payload.answers[tab.code] = answers[tab.code] || {};
      payload.comments[tab.code] = comments[tab.code] || {};
    });
  } else {
    payload.answers[code] = answers[code] || {};
    payload.comments[code] = comments[code] || {};
  }

  const btn = document.getElementById('btn-export');
  btn.textContent = 'Génération...';
  btn.disabled = true;

  fetch('/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (!res.ok) throw new Error('Erreur serveur');
    return res.blob();
  })
  .then(function(blob) {
    const displayCode = code === 'A7A8' ? 'A7-A8' : code;
    const filename = date + ' - GQualité ' + displayCode + ' - ' + nom + '.xlsx';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    btn.textContent = 'Exporter .xlsx';
    btn.disabled = false;
  })
  .catch(function(err) {
    alert('Erreur : ' + err.message);
    btn.textContent = 'Exporter .xlsx';
    btn.disabled = false;
  });
}
showList();
</script>
